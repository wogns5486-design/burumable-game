<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>POPUP MARBLE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="board-wrapper">
      <div id="board"></div>

      <!-- 보드 중앙 -->
      <div id="board-center">
        <div id="center-logo">
          <span class="logo-pop">POPUP</span>
          <span class="logo-marble">MARBLE</span>
        </div>

        <div id="dice-area">
          <div id="dice-container">
            <div class="dice-3d" id="dice1"><div class="dice-cube"></div></div>
            <div class="dice-3d" id="dice2"><div class="dice-cube"></div></div>
          </div>
          <div id="dice-result"></div>
        </div>

        <button id="roll-btn" onclick="rollDice()">
          <span class="btn-icon">🎲</span>
          <span>주사위 굴리기</span>
        </button>

        <div id="info-bar">
          <div class="info-item">
            <div class="info-val" id="current-pos">출발</div>
            <div class="info-label">현재 위치</div>
          </div>
          <div class="info-divider"></div>
          <div class="info-item">
            <div class="info-val" id="move-count">0</div>
            <div class="info-label">턴</div>
          </div>
          <div class="info-divider"></div>
          <div class="info-item">
            <div class="info-val" id="points">0</div>
            <div class="info-label">포인트</div>
          </div>
        </div>

        <div id="event-log">
          <div id="event-card" class="event-card">
            <p id="event-text">주사위를 굴려 게임을 시작하세요!</p>
          </div>
        </div>

        <button id="reset-btn" onclick="resetGame()">↻ 다시 시작</button>
      </div>
    </div>

    <!-- 파티클 컨테이너 -->
    <div id="particles"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
